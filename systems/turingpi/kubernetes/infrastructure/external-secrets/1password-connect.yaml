apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: 1password-connect
  namespace: external-secrets
spec:
  interval: 5m
  chart:
    spec:
      chart: connect
      version: "1.14.0"
      sourceRef:
        kind: HelmRepository
        name: 1password
        namespace: flux-system
  install:
    createNamespace: true
  values:
    connect:
      # credentials.json is mounted from the secret below
      credentials:
        secretName: onepassword-credentials
      replicaCount: 1
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
    service:
      type: ClusterIP
      port: 8080
