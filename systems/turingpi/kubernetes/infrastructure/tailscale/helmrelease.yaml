apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 5m
  chart:
    spec:
      chart: tailscale-operator
      version: "1.94.2"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  install:
    createNamespace: true
  values:
    operatorConfig:
      defaultTags:
        - tag:k8s
    oauth:
      clientId:
        secretKeyRef:
          name: operator-oauth
          key: client_id
      clientSecret:
        secretKeyRef:
          name: operator-oauth
          key: client_secret
