clusterName: turingpi
talosVersion: v1.12.0
endpoint: https://192.168.1.10:6443
allowSchedulingOnControlPlanes: true

controlPlane:
  talosImageURL: factory.talos.dev/installer/85f683902139269fbc5a7f64ea94a694d31e0b3d94347a225223fcbd042083ae
  patches:
    - &baselonghorn |-
      machine:
        kubelet:
          extraMounts:
            - destination: /var/lib/longhorn
              type: bind
              source: /var/lib/longhorn
              options:
                - bind
                - rshared
                - rw
          nodeIP:
            validSubnets:
              - "192.168.1.0/24"
              - "fdd7:ad7c:fa:4181::/64"
          extraConfig:
            serverTLSBootstrap: true

worker:
  talosImageURL: factory.talos.dev/installer/85f683902139269fbc5a7f64ea94a694d31e0b3d94347a225223fcbd042083ae
  patches:
    - *baselonghorn

# Per-node static network config. The interface is `end0` on the Rockchip SoC
# (not `eth0` — that name doesn't exist and silently disabled any DHCP/route
# config we tried to apply through it). Talhelper doesn't support node-field
# templating inside patches (Patches []string with v1alpha1.Config template
# context only), so the per-node IP is repeated literally below.
nodes:
  - hostname: "n1"
    ipAddress: 192.168.1.234
    installDisk: /dev/nvme0n1
    controlPlane: true
    schematic: &schematic
      overlay:
        image: siderolabs/sbc-rockchip
        name: turingrk1
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    patches:
      - |-
        machine:
          network:
            interfaces:
              - interface: end0
                addresses:
                  - 192.168.1.234/24
                vip:
                  ip: 192.168.1.10
                routes:
                  - network: 0.0.0.0/0
                    gateway: 192.168.1.254
            nameservers:
              - 192.168.1.42

  - hostname: "n2"
    ipAddress: 192.168.1.235
    installDisk: /dev/nvme0n1
    controlPlane: true
    schematic: *schematic
    patches:
      - |-
        machine:
          network:
            interfaces:
              - interface: end0
                addresses:
                  - 192.168.1.235/24
                vip:
                  ip: 192.168.1.10
                routes:
                  - network: 0.0.0.0/0
                    gateway: 192.168.1.254
            nameservers:
              - 192.168.1.42

  - hostname: "n3"
    ipAddress: 192.168.1.236
    installDisk: /dev/nvme0n1
    controlPlane: true
    schematic: *schematic
    patches:
      - |-
        machine:
          network:
            interfaces:
              - interface: end0
                addresses:
                  - 192.168.1.236/24
                vip:
                  ip: 192.168.1.10
                routes:
                  - network: 0.0.0.0/0
                    gateway: 192.168.1.254
            nameservers:
              - 192.168.1.42

  - hostname: "n4"
    ipAddress: 192.168.1.233
    installDisk: /dev/nvme0n1
    schematic: *schematic
    patches:
      - |-
        machine:
          network:
            interfaces:
              - interface: end0
                addresses:
                  - 192.168.1.233/24
                routes:
                  - network: 0.0.0.0/0
                    gateway: 192.168.1.254
            nameservers:
              - 192.168.1.42
