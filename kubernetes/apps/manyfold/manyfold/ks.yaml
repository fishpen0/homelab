apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: manyfold
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/apps/manyfold/manyfold/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-system
    - name: external-secrets-config
    - name: longhorn
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: manyfold
      namespace: default
