---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: manyfold-redis
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 1h
  values:
    controllers:
      redis:
        strategy: Recreate
        containers:
          redis:
            image:
              repository: redis
              tag: "8.8-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1"
            args: ["--save", "", "--appendonly", "no"]  # ephemeral; queue rebuilds on restart
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["redis-cli", "ping"]
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["redis-cli", "ping"]
                  initialDelaySeconds: 2
                  periodSeconds: 5
            resources:
              requests:
                cpu: 20m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      redis:
        controller: redis
        ports:
          redis:
            port: 6379
