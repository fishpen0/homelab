---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: manyfold-postgres
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 1h
  values:
    controllers:
      postgres:
        strategy: Recreate
        containers:
          postgres:
            image:
              repository: postgres
              tag: "15.18@sha256:1b92e7a80c021647bf70f5d3eb66066a998e4f5cf43c07bb9dc9f729782cf88e"
            env:
              POSTGRES_USER: manyfold
              POSTGRES_DB: manyfold
              PGDATA: /var/lib/postgresql/data/pgdata
            envFrom:
              - secretRef:
                  # Provides POSTGRES_PASSWORD (and DATABASE_PASSWORD, ignored here)
                  name: manyfold-secrets
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "manyfold", "-d", "manyfold"]
                  initialDelaySeconds: 30
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "manyfold", "-d", "manyfold"]
                  initialDelaySeconds: 5
                  periodSeconds: 5
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        pod:
          enableServiceLinks: false
    service:
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432
    persistence:
      data:
        existingClaim: manyfold-postgres-data
        globalMounts:
          - path: /var/lib/postgresql/data
