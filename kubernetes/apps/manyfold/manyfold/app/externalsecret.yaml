---
# Pulls SECRET_KEY_BASE + DATABASE_PASSWORD from two 1Password Password-category
# items in the Homelab vault. Both items hold their secret in the default `password`
# field — see MEMORY.md "1Password Item Conventions" for rationale.
#
# Required 1Password items (create manually before applying):
#   Vault: Homelab
#   Items:
#     - manyfold-secret-key-base      (Password category) — `openssl rand -hex 64`
#     - manyfold-database-password    (Password category) — any strong random password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: manyfold-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster
    kind: ClusterSecretStore
  target:
    name: manyfold-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: manyfold-secret-key-base
        property: password
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: manyfold-database-password
        property: password
    # Same value, second env var name so the Postgres image picks it up via envFrom.
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: manyfold-database-password
        property: password
