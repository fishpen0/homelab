---
# Pulls SECRET_KEY_BASE and DATABASE_PASSWORD from the 1Password "manyfold" item
# via the cluster-wide onepassword-cluster ClusterSecretStore.
#
# Required 1Password item (create manually before applying):
#   Vault: homelab           (or whichever vault the ClusterSecretStore is scoped to)
#   Item:  manyfold          (Secure Note or Login)
#   Fields:
#     - secret_key_base       128-char hex string  → `openssl rand -hex 64`
#     - database_password     random password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: manyfold-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster
    kind: ClusterSecretStore
  target:
    name: manyfold-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: manyfold
        property: secret_key_base
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: manyfold
        property: database_password
    # Same value, second key name so the Postgres image picks it up via envFrom.
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: manyfold
        property: database_password
