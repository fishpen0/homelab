---
# Pulls Grafana admin password from 1Password.
#
# Required 1Password item (create manually before applying):
#   Vault: Homelab
#   Item: grafana-admin-password  (Password category)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin-password
        property: password
