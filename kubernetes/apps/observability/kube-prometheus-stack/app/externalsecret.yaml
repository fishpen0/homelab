---
# Pulls Grafana admin username + password from 1Password.
#
# Required 1Password item (create manually before applying):
#   Vault: Homelab
#   Item: grafana-admin  (Login category — has both username and password)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  # The grafana chart's existingSecret needs both admin-user and admin-password keys.
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana-admin
        property: username
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin
        property: password
