---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-monitoring
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/apps/longhorn-system/longhorn-monitoring/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: longhorn
    - name: monitoring
