apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cert-manager
  - external-secrets
  - kube-system
  - longhorn-system
  - manyfold
  - observability
  - tailscale
patches:
  # Inject HelmRelease defaults into every Flux Kustomization in this tree.
  # Fixes the 0-retry default (Stalled on any transient error) and ensures
  # CRDs are always up-to-date after chart bumps.
  - patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: _
      spec:
        patches:
          - patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: _
              spec:
                install:
                  crds: CreateReplace
                  remediation:
                    retries: -1
                rollback:
                  cleanupOnFail: true
                upgrade:
                  cleanupOnFail: true
                  crds: CreateReplace
                  remediation:
                    remediateLastFailure: true
                    retries: 3
            target:
              group: helm.toolkit.fluxcd.io
              kind: HelmRelease
    target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
  # Longhorn override: Longhorn docs recommend not auto-replacing CRDs during
  # upgrades — major version bumps can have destructive CRD changes that need
  # manual review. All other defaults (remediation, cleanupOnFail) still apply.
  - patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: longhorn
      spec:
        patches:
          - patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: _
              spec:
                install:
                  crds: CreateReplace
                  remediation:
                    retries: -1
                rollback:
                  cleanupOnFail: true
                upgrade:
                  cleanupOnFail: true
                  crds: Skip
                  remediation:
                    remediateLastFailure: true
                    retries: 3
            target:
              group: helm.toolkit.fluxcd.io
              kind: HelmRelease
    target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: longhorn
