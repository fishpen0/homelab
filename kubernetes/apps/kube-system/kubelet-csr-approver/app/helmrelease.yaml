apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
  namespace: kubelet-csr-approver
spec:
  interval: 5m
  chart:
    spec:
      chart: kubelet-csr-approver
      version: "1.2.*"
      sourceRef:
        kind: HelmRepository
        name: kubelet-csr-approver
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: true
  values:
    providerRegex: "^(n1|n2|n3|n4)$"
    providerIpPrefixes:
      - "192.168.1.0/24"
      - "fdd7:ad7c:fa:4181::/64"
      - "fe80::/10"
      # ISP-assigned IPv6 prefix. Whitelisted at /48 because the /64 within can
      # rotate; the /48 delegation is comparatively stable on AT&T fiber. See
      # TODO/ipv6-stability.md for the proper fix.
      - "2600:1700:89c2::/48"
