apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-smb
  namespace: csi-driver-smb
spec:
  interval: 5m
  chart:
    spec:
      chart: csi-driver-smb
      version: "1.20.1"
      sourceRef:
        kind: HelmRepository
        name: csi-driver-smb
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
  values:
    # Talos kubelet is at the default /var/lib/kubelet — no override needed.
    controller:
      replicas: 1
