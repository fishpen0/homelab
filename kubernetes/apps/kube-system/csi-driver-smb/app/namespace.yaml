apiVersion: v1
kind: Namespace
metadata:
  name: csi-driver-smb
  labels:
    # CSI node DaemonSet runs privileged (host mounts, bidirectional mount
    # propagation) — same posture as longhorn-system.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
