---
# Cluster-wide SMB credential. Every NAS-backed PV references this via
# nodeStageSecretRef, so apps carry no creds of their own. Granted RW on the
# whole `Library` share, so it reaches any subfolder a PV mounts.
# 1Password (Homelab vault): Login item `unraid-k8s-user` (username/password fields).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: smb-creds
  namespace: csi-driver-smb
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster
    kind: ClusterSecretStore
  target:
    name: smb-creds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: unraid-k8s-user
        property: username
    - secretKey: password
      remoteRef:
        key: unraid-k8s-user
        property: password
