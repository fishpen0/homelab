---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: csi-driver-smb-config
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/apps/kube-system/csi-driver-smb-config/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    # Driver must be installed (CSIDriver registered) before the share PVs apply,
    # and the ClusterSecretStore must be Ready before the smb-creds ExternalSecret.
    - name: csi-driver-smb
    - name: external-secrets-config
