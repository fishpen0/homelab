apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 5m
  chart:
    spec:
      chart: tailscale-operator
      version: "1.96.5"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  install:
    createNamespace: true
  values:
    apiServerProxyConfig:
      mode: "true"
    operatorConfig:
      hostname: turingpi-k8s
      defaultTags:
        - tag:k8s
    # No oauth values: the operator auto-discovers the conventionally-named
    # operator-oauth Secret. Keeping oauth out of Helm values leaves SOPS as the
    # sole owner of that Secret, avoiding the Helm/Flux dual-ownership race that
    # let the operator boot with stale creds on cold start.
