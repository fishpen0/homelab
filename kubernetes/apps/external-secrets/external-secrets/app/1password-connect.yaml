apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: 1password-connect
  namespace: external-secrets
spec:
  interval: 5m
  chart:
    spec:
      chart: connect
      version: "2.4.1"
      sourceRef:
        kind: HelmRepository
        name: 1password
        namespace: flux-system
  install:
    createNamespace: true
  values:
    connect:
      # Use the existing onepassword-credentials secret (created from secret.sops.yaml).
      # The key inside that secret is `credentials.json`, not the chart default
      # of `1password-credentials.json`, so override credentialsKey too.
      create: true
      credentialsName: onepassword-credentials
      credentialsKey: credentials.json
      replicas: 1
      api:
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
      sync:
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
      serviceType: ClusterIP
