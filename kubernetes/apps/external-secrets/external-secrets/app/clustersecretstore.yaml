apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: onepassword-cluster
spec:
  provider:
    onepassword:
      connectHost: http://1password-connect.external-secrets.svc.cluster.local:8080
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-credentials
            key: token
            namespace: external-secrets
