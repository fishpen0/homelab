---
# Initial admin user for Forgejo. The chart's gitea.admin.existingSecret expects
# a Secret with `username` + `password` keys, so we template a static username
# alongside the password pulled from 1Password.
#
# Required 1Password item (create manually before applying):
#   Vault: Homelab
#   Item:  forgejo-admin-password   (Password category) — any strong random password
#          (secret lives in the default `password` field — see MEMORY.md
#           "1Password Item Conventions")
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster
    kind: ClusterSecretStore
  target:
    name: forgejo-admin
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "forgejo_admin"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: forgejo-admin-password
        property: password
