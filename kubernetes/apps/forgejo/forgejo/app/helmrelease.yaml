---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: forgejo
      version: "17.1.1"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
  values:
    # Forgejo is not HA-ready: exactly one replica, recreate on upgrade so the
    # single RWO Longhorn PVC is never mounted by two pods at once.
    replicaCount: 1
    strategy:
      type: Recreate

    # Live git data + SQLite DB on Longhorn (replicas=2, worker node). The NAS is
    # a backup target only — CIFS locking semantics don't suit git's internals.
    persistence:
      enabled: true
      create: true
      storageClass: longhorn
      size: 20Gi
      accessModes:
        - ReadWriteOnce

    # Web/API only over Tailscale (HTTPS). SSH clone is deferred — keep the ssh
    # service ClusterIP-internal rather than exposing a LoadBalancer.
    service:
      ssh:
        type: ClusterIP

    ingress:
      enabled: true
      className: tailscale
      hosts:
        - host: forgejo
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - forgejo

    gitea:
      admin:
        existingSecret: forgejo-admin
        email: "claude@loganstuart.com"
      # Scrape into the cluster kube-prometheus-stack, matching the repo's
      # observability convention (selector label release=kube-prometheus-stack).
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
      config:
        database:
          DB_TYPE: sqlite3
        # No Redis in-cluster — keep session/cache/queue node-local.
        session:
          PROVIDER: memory
        cache:
          ADAPTER: memory
        queue:
          TYPE: level
        server:
          DOMAIN: forgejo.ferret-pound.ts.net
          ROOT_URL: https://forgejo.ferret-pound.ts.net
          SSH_DOMAIN: forgejo.ferret-pound.ts.net
        service:
          # Mirror cache / single-user forge — no open sign-ups.
          DISABLE_REGISTRATION: true
