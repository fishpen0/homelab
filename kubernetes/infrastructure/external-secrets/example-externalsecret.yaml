# Example ExternalSecret — COPY & CUSTOMIZE for your needs
# This demonstrates how to pull secrets from 1Password vault
#
# Steps to use:
# 1. Create a secret in 1Password with your desired data
# 2. Note the vault name and secret name
# 3. Copy this file and update the spec below
# 4. Delete this file when ready to use real secrets

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: example-secret
  namespace: default  # Change to your namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster
    kind: ClusterSecretStore
  target:
    name: example-secret  # Name of the Kubernetes secret to create
    creationPolicy: Owner
  data:
    # Example: pull a field from 1Password
    # - secretKey: MY_PASSWORD  # Key in the Kubernetes secret
    #   remoteRef:
    #     name: "my-secret"      # Secret name in 1Password
    #     property: "password"   # Field name within the secret
    - secretKey: username
      remoteRef:
        name: "example-credentials"
        property: "username"
    - secretKey: password
      remoteRef:
        name: "example-credentials"
        property: "password"
